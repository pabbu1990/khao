<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Khao storefront — search mockup</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>:root{--font-sans:'Hanken Grotesk',system-ui,sans-serif}body{margin:0;background:#EFE7DA;padding:24px;font-family:var(--font-sans)}</style>
</head><body>
<div style="background:#FBF6EE; border-radius:16px; overflow:hidden; color:#2A1810; max-width:560px; margin:0 auto;">
  <div style="background:#fff; border-bottom:1px solid #EADFCD; padding:14px 16px;">
    <div style="display:flex; align-items:center; gap:8px; border:1px solid #E0922F; box-shadow:0 0 0 3px rgba(224,146,47,0.15); border-radius:10px; padding:9px 12px; font-size:14px;"><i class="ti ti-search" style="font-size:16px; color:rgba(42,24,16,0.45);"></i><span style="color:#2A1810;">chick</span><span style="margin-left:auto; color:rgba(42,24,16,0.35);"><i class="ti ti-x" style="font-size:15px;"></i></span></div>
  </div>
  <div style="padding:14px 16px;">
    <div style="font-size:12px; color:rgba(42,24,16,0.5); margin-bottom:10px;">2 dishes match “chick”</div>
    <div style="display:flex; align-items:center; gap:12px; background:#fff; border:1px solid #EADFCD; border-radius:12px; padding:10px; margin-bottom:8px;">
      <div style="width:56px; height:56px; border-radius:9px; background:#F4EBDD; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#E0922F;"><i class="ti ti-bowl-spoon" style="font-size:22px;"></i></div>
      <div style="flex:1; min-width:0;"><div style="display:flex; align-items:center; gap:6px;"><span style="width:13px;height:13px;border:1.6px solid #C0392B;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;"><span style="width:6px;height:6px;border-radius:50%;background:#C0392B;"></span></span><span style="font-weight:500;">Chicken</span></div><div style="font-size:12px; color:rgba(42,24,16,0.4);">Weekend Specials · spicy</div></div>
      <div style="font-weight:500; font-size:15px; margin-right:4px;">$3.00</div><span style="background:#E0922F; color:#2A1810; border-radius:9px; padding:7px 16px; font-size:13px; font-weight:500;">Add</span>
    </div>
    <div style="display:flex; align-items:center; gap:12px; background:#fff; border:1px solid #EADFCD; border-radius:12px; padding:10px;">
      <div style="width:56px; height:56px; border-radius:9px; background:#F4EBDD; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#E0922F;"><i class="ti ti-bowl-spoon" style="font-size:22px;"></i></div>
      <div style="flex:1; min-width:0;"><div style="display:flex; align-items:center; gap:6px;"><span style="width:13px;height:13px;border:1.6px solid #C0392B;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;"><span style="width:6px;height:6px;border-radius:50%;background:#C0392B;"></span></span><span style="font-weight:500;">Chicken Biryani</span></div><div style="font-size:12px; color:rgba(42,24,16,0.4);">Weekday Lunch · with raita</div></div>
      <div style="font-weight:500; font-size:15px; margin-right:4px;">$12.00</div><span style="background:#E0922F; color:#2A1810; border-radius:9px; padding:7px 16px; font-size:13px; font-weight:500;">Add</span>
    </div>
  </div>
</div>
</body></html>
